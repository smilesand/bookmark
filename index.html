<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咪豆猫书签导航 | AI、开发与设计资源高效聚合</title>
    <meta name="description" content="咪豆猫书签导航聚合 AI、开发、设计、学习与效率工具，提供更快的搜索、更清晰的分类浏览和更顺滑的书签发现体验。">
    <meta name="keywords" content="书签导航,AI工具,开发资源,设计灵感,学习网站,效率工具,网址收藏">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta name="theme-color" content="#1b2f4d">
    <meta property="og:type" content="website">
    <meta property="og:title" content="咪豆猫书签导航">
    <meta property="og:description" content="聚合 AI、开发、设计、学习与效率工具的网站导航。">
    <link href="favicon.ico" rel="shortcut icon">
    <style>
        :root {
            --bg: #f4ede4;
            --bg-accent: #ece0cf;
            --surface: rgba(255, 255, 255, 0.86);
            --surface-strong: #fffdf9;
            --surface-muted: rgba(255, 249, 242, 0.72);
            --text: #1b2f4d;
            --text-secondary: #5d6b80;
            --line: rgba(27, 47, 77, 0.12);
            --brand: #325583;
            --brand-strong: #1b2f4d;
            --accent: #c86d43;
            --accent-soft: rgba(200, 109, 67, 0.14);
            --shadow-lg: 0 24px 56px rgba(27, 47, 77, 0.12);
            --shadow-md: 0 12px 28px rgba(27, 47, 77, 0.09);
            --shadow-sm: 0 6px 16px rgba(27, 47, 77, 0.06);
            --radius-xl: 26px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --container: 1480px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font: 15px/1.55 "Noto Sans SC", "Source Han Sans SC", "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(200, 109, 67, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(50, 85, 131, 0.14), transparent 24%),
                linear-gradient(180deg, #fbf6ef 0%, var(--bg) 46%, var(--bg-accent) 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(27, 47, 77, 0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(27, 47, 77, 0.025) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.5), transparent 78%);
            opacity: 0.45;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
        }

        .skip-link {
            position: absolute;
            left: 1rem;
            top: -3rem;
            z-index: 20;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            background: var(--brand-strong);
            color: #fff;
            transition: top 0.2s ease;
        }

        .skip-link:focus {
            top: 1rem;
        }

        .container {
            width: min(calc(100% - 1.5rem), var(--container));
            margin: 0 auto;
        }

        .site-header {
            padding: 0.9rem 0 0.7rem;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.95rem 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: var(--radius-xl);
            background: rgba(255, 255, 255, 0.78);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(16px);
        }

        .topbar-copy {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            min-width: 0;
        }

        .topbar-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.36rem 0.7rem;
            border: 1px solid rgba(50, 85, 131, 0.12);
            border-radius: 999px;
            background: rgba(50, 85, 131, 0.08);
            color: var(--brand-strong);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .topbar-title h1 {
            font-size: 1.15rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .topbar-title p {
            margin-top: 0.16rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .topbar-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.65rem;
            min-width: min(520px, 100%);
        }

        .secondary-link,
        .chip-button,
        .filter-chip,
        .category-link,
        .text-button,
        .sort-control select {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            box-shadow: var(--shadow-sm);
            transition: transform 0.18s ease, background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease;
        }

        .secondary-link,
        .chip-button,
        .filter-chip,
        .category-link,
        .text-button {
            border-radius: 999px;
        }

        .secondary-link,
        .chip-button,
        .text-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 40px;
            padding: 0.62rem 0.95rem;
        }

        .secondary-link:hover,
        .chip-button:hover,
        .filter-chip:hover,
        .category-link:hover,
        .text-button:hover,
        .bookmark-action:hover {
            transform: translateY(-1px);
        }

        .stat-card {
            padding: 0.75rem 0.85rem;
            border: 1px solid rgba(50, 85, 131, 0.08);
            border-radius: 16px;
            background: rgba(255, 252, 248, 0.86);
        }

        .stat-value {
            display: block;
            font-size: 1.14rem;
            font-weight: 700;
        }

        .stat-label {
            display: block;
            margin-top: 0.15rem;
            color: var(--text-secondary);
            font-size: 0.78rem;
        }

        .page-main {
            padding-bottom: 4.2rem;
        }

        .toolbar {
            margin-top: 0.9rem;
            padding: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: var(--radius-xl);
            background: var(--surface);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow-md);
        }

        .toolbar-top {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
        }

        .search-shell {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            flex: 1;
            padding: 0.5rem 0.62rem 0.5rem 0.9rem;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
        }

        .search-shell:focus-within {
            border-color: rgba(50, 85, 131, 0.35);
            box-shadow: 0 0 0 4px rgba(50, 85, 131, 0.12);
        }

        .search-icon {
            color: var(--text-secondary);
            font-size: 0.96rem;
        }

        .search-shell input {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 0.92rem;
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .sort-control {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }

        .sort-control select {
            min-height: 40px;
            padding: 0.65rem 0.85rem;
            border-radius: 999px;
            outline: none;
        }

        .toolbar-hint {
            margin-top: 0.7rem;
            color: var(--text-secondary);
            font-size: 0.86rem;
        }

        .app-shell {
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr);
            gap: 1.35rem;
            margin-top: 1rem;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 0.9rem;
            display: grid;
            gap: 1rem;
        }

        .sidebar-card,
        .content-panel,
        .overview-card,
        .bookmark-card,
        .loading-card,
        .empty-state {
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-xl);
            background: var(--surface);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow-md);
        }

        .sidebar-card {
            padding: 1rem;
        }

        .sidebar-card h2 {
            font-size: 0.95rem;
        }

        .sidebar-card p {
            margin-top: 0.32rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .category-nav,
        .featured-list,
        .quick-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            margin-top: 0.85rem;
        }

        .category-link,
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.54rem 0.82rem;
            font-size: 0.84rem;
        }

        .category-link.active,
        .filter-chip.active,
        .chip-button.active,
        .text-button.active {
            background: var(--brand-strong);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 14px 24px rgba(27, 47, 77, 0.18);
        }

        .sidebar-search {
            margin-top: 0.9rem;
        }

        .sidebar-search .search-shell {
            padding-left: 0.82rem;
        }

        .content-panel {
            min-height: 60vh;
            padding: 1.15rem 1.25rem;
        }

        .results-header {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: end;
        }

        .eyebrow {
            color: var(--brand);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .results-header h2 {
            margin-top: 0.24rem;
            font-size: clamp(1.18rem, 1.7vw, 1.65rem);
            line-height: 1.1;
        }

        .result-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.75rem;
            align-items: center;
            color: var(--text-secondary);
            text-align: right;
            font-size: 0.86rem;
        }

        .content-area {
            margin-top: 1rem;
        }

        .overview-grid,
        .bookmark-grid {
            display: grid;
            gap: 1rem;
        }

        .overview-grid {
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
        }

        .bookmark-grid {
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        }

        .overview-card,
        .bookmark-card {
            content-visibility: auto;
            contain-intrinsic-size: 260px;
        }

        .overview-card {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            padding: 1rem;
        }

        .overview-card header,
        .bookmark-card header {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
            align-items: start;
        }

        .overview-card h3,
        .bookmark-card h3 {
            font-size: 0.97rem;
            line-height: 1.35;
        }

        .count-badge,
        .domain-badge,
        .category-badge,
        .meta-badge {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0.28rem 0.66rem;
            border-radius: 999px;
            font-size: 0.76rem;
            white-space: nowrap;
        }

        .count-badge,
        .category-badge {
            background: rgba(50, 85, 131, 0.1);
            color: var(--brand-strong);
        }

        .domain-badge,
        .meta-badge {
            background: rgba(27, 47, 77, 0.08);
            color: var(--text-secondary);
        }

        .overview-summary,
        .bookmark-description,
        .bookmark-meta {
            color: var(--text-secondary);
        }

        .overview-summary,
        .bookmark-description {
            font-size: 0.87rem;
        }

        .overview-preview {
            display: grid;
            gap: 0.58rem;
        }

        .preview-link {
            display: block;
            padding: 0.72rem 0.85rem;
            border-radius: var(--radius-md);
            background: var(--surface-muted);
            border: 1px solid rgba(27, 47, 77, 0.06);
        }

        .preview-link strong {
            display: block;
            color: var(--text);
            font-size: 0.86rem;
        }

        .preview-link span {
            display: block;
            margin-top: 0.1rem;
            color: var(--text-secondary);
            font-size: 0.76rem;
        }

        .overview-footer,
        .bookmark-footer {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.7rem;
            align-items: end;
        }

        .bookmark-card {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            padding: 1rem;
        }

        .bookmark-card a.bookmark-title {
            color: var(--text);
        }

        .bookmark-card a.bookmark-title:hover {
            color: var(--brand);
        }

        .bookmark-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .bookmark-footer {
            margin-top: auto;
        }

        .bookmark-action {
            min-height: auto;
            padding: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 0.2rem;
            font-size: 0.83rem;
            font-weight: 600;
        }

        .loading-stack {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
        }

        .loading-card {
            min-height: 220px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.58) 0%, rgba(255, 255, 255, 0.92) 48%, rgba(255, 255, 255, 0.58) 100%);
            background-size: 220% 100%;
            animation: shimmer 1.8s linear infinite;
        }

        @keyframes shimmer {
            from {
                background-position: 100% 0;
            }

            to {
                background-position: -100% 0;
            }
        }

        .empty-state {
            padding: 2rem;
            text-align: center;
        }

        .empty-state h3 {
            font-size: 1.18rem;
        }

        .empty-state p {
            margin-top: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }

        .match-mark {
            padding: 0 0.15rem;
            border-radius: 0.35rem;
            background: rgba(200, 109, 67, 0.18);
            color: inherit;
        }

        .feed-footer {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .feed-status {
            color: var(--text-secondary);
            font-size: 0.84rem;
        }

        .feed-status strong {
            color: var(--text);
        }

        .back-to-top {
            position: fixed;
            right: 1.2rem;
            bottom: 1.2rem;
            z-index: 10;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--brand-strong);
            color: #fff;
            box-shadow: 0 16px 30px rgba(27, 47, 77, 0.22);
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 1200px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .topbar-stats {
                min-width: 0;
            }

            .app-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }
        }

        @media (max-width: 720px) {
            .container {
                width: min(calc(100% - 1rem), var(--container));
            }

            .toolbar-top,
            .results-header {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .toolbar-actions>* {
                flex: 1 1 180px;
            }

            .topbar-actions,
            .category-nav,
            .featured-list,
            .quick-filters {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 0.25rem;
                scrollbar-width: thin;
            }

            .topbar-stats {
                grid-template-columns: 1fr 1fr;
            }

            .content-panel,
            .toolbar,
            .sidebar-card,
            .overview-card,
            .bookmark-card {
                border-radius: 22px;
            }

            .overview-footer,
            .bookmark-footer {
                display: flex;
                flex-direction: column;
                align-items: stretch;
            }

            .bookmark-action {
                align-self: flex-end;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <a class="skip-link" href="#content-panel">跳到主要内容</a>

    <header class="site-header">
        <div class="container topbar">
            <div class="topbar-copy">
                <span class="topbar-tag">咪豆猫书签导航</span>
                <div class="topbar-title">
                    <h1>更快找到真正常用的网站资源</h1>
                    <p>聚合 AI、开发、设计、学习与效率工具。</p>
                </div>
            </div>
            <div class="topbar-actions">
                <a class="secondary-link" href="https://github.com/smilesand/bookmark" target="_blank" rel="noopener noreferrer" aria-label="查看 GitHub 项目">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

                    </svg>
                    <span>查看项目</span>
                </a>
            </div>
            <div class="topbar-stats" aria-label="书签统计">
                <article class="stat-card">
                    <span class="stat-value" id="stat-bookmarks">0</span>
                    <span class="stat-label">总书签数</span>
                </article>
                <article class="stat-card">
                    <span class="stat-value" id="stat-categories">0</span>
                    <span class="stat-label">分类数量</span>
                </article>
                <article class="stat-card">
                    <span class="stat-value" id="stat-largest">-</span>
                    <span class="stat-label">最大分类</span>
                </article>
                <article class="stat-card">
                    <span class="stat-value" id="stat-recent">-</span>
                    <span class="stat-label">最近更新</span>
                </article>
            </div>
        </div>
    </header>

    <main class="container page-main">
        <section class="toolbar" aria-label="搜索与筛选">
            <div class="toolbar-top">
                <div class="search-shell">
                    <label class="visually-hidden" for="search-input">搜索书签</label>
                    <span class="search-icon" aria-hidden="true">⌕</span>
                    <input type="search" id="search-input" placeholder="搜索分类、标题、描述或域名" autocomplete="off" aria-label="搜索书签">
                    <button type="button" class="chip-button" id="clear-search" aria-label="清空搜索">清空</button>
                </div>
                <div class="toolbar-actions">
                    <label class="sort-control" for="sort-select">
                        <span>排序</span>
                        <select id="sort-select">
                            <option value="relevance">智能排序</option>
                            <option value="recent">最近添加</option>
                            <option value="title">名称 A-Z</option>
                        </select>
                    </label>
                    <button type="button" class="text-button" id="reset-view">查看概览</button>
                </div>
            </div>
            <p class="toolbar-hint" id="search-hint">输入关键词，快速找到相关网站与工具。</p>
        </section>

        <div class="app-shell">
            <aside class="sidebar" aria-label="分类与快捷入口">
                <section class="sidebar-card">
                    <h2>分类导航</h2>
                    <p id="sidebar-summary">正在加载...</p>
                    <nav class="category-nav" id="category-nav" aria-label="书签分类"></nav>
                </section>
                <section class="sidebar-card">
                    <h2>高频分类</h2>
                    <p>优先展示书签数量最多的分类，方便快速进入。</p>
                    <div class="featured-list" id="featured-categories"></div>
                    <div class="sidebar-search">
                        <div class="search-shell">
